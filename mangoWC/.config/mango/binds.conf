# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# Recargar configuración ==============================
bind=SUPER+ALT,r,reload_config

# Menú y terminal ==============================
# bind=SUPER,d,spawn,rofi -show drun
bind=SUPER,Return,spawn,kitty

# Cerrar y salir ==============================
bind=SUPER,q,killclient,
bind=SUPER+CTRL+ALT,q,quit

# Cambiar la ventana en foco ==============================
bind=ALT,Tab,toggleoverview
bind=SUPER,Tab,togglejump

bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusstack,prev
bind=SUPER,Down,focusstack,next

bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right
bind=SUPER,k,focusstack,prev
bind=SUPER,j,focusstack,next

# Intercambiar ventanas ==============================
bind=SUPER,Space,zoom

bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,l,exchange_client,right

# Cambiar el estado de las ventanas ==============================
bind=SUPER,g,toggleglobal,
bind=SUPER,o,toggleoverlay,

bind=SUPER+SHIFT,Space,togglefloating,

bind=SUPER,f,togglemaximizescreen,
bind=SUPER+SHIFT,f,togglefullscreen,
bind=SUPER+ALT,f,togglefakefullscreen,

bind=SUPER,w,minimized,
bind=SUPER+SHIFT,w,restore_minimized
bind=SUPER,z,toggle_scratchpad

# scroller layout ==============================
bind=SUPER,r,switch_proportion_preset,
bind=SUPER+SHIFT,r,set_proportion,0.5

bind=SUPER,BracketLeft,scroller_stack,left
bind=SUPER,BracketRight,scroller_stack,right

#dwindle layout(manual split mode) ==============================
bind=alt+shift,Return,dwindle_toggle_split_direction

# switch layout ==============================
# bind=SUPER,n,switch_layout
bind=SUPER,t,setlayout,tile
bind=SUPER,y,setlayout,scroller
bind=SUPER+SHIFT,t,setlayout,dwindle
bind=SUPER+SHIFT,y,setlayout,deck

# Cambiar de Tag (workspace) ==============================
bind=SUPER,Page_Up,viewtoleft,0
bind=SUPER,Page_Down,viewtoright,0
bind=SUPER,u,viewtoleft,0
bind=SUPER,i,viewtoright,0

bind=SUPER,1,comboview,1,0
bind=SUPER,2,comboview,2,0
bind=SUPER,3,comboview,3,0
bind=SUPER,4,comboview,4,0
bind=SUPER,5,comboview,5,0
bind=SUPER,6,comboview,6,0
bind=SUPER,7,comboview,7,0
bind=SUPER,8,comboview,8,0
bind=SUPER,9,comboview,9,0

# Cambiar ventanas entre tags ==============================
bind=SUPER+SHIFT,Page_Up,tagtoleft,0
bind=SUPER+SHIFT,Page_Down,tagtoright,0
bind=SUPER+SHIFT,u,tagtoleft,0
bind=SUPER+SHIFT,i,tagtoright,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=Alt,1,tagsilent,1
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# Cambiar de monitor ==============================
bind=alt+shift,Left,focusmon,left
bind=alt+shift,Right,focusmon,right
bind=SUPER+Alt,Left,tagmon,left
bind=SUPER+Alt,Right,tagmon,right

# Mover flotantes ==============================
# bind=CTRL+ALT,Up,movewin,+0,-50
# bind=CTRL+ALT,Down,movewin,+0,+50
# bind=CTRL+ALT,Left,movewin,-50,+0
# bind=CTRL+ALT,Right,movewin,+50,+0

bind=CTRL+ALT,Up,smartmovewin,up
bind=CTRL+ALT,Down,smartmovewin,down
bind=CTRL+ALT,Left,smartmovewin,left
bind=CTRL+ALT,Right,smartmovewin,right

# Cambiar tamaño ==============================
bind=SUPER,Minus,resizewin,-50,+0
bind=SUPER,Equal,resizewin,+50,+0
bind=SUPER+SHIFT,Minus,resizewin,+0,-50
bind=SUPER+SHIFT,Equal,resizewin,+0,+50


# Mouse Button Bindings ==============================
# btn_left and btn_right can't bind none mod key
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
mousebind=SUPER,btn_middle,togglemaximizescreen,0

# Axis Bindings ==============================
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

# Gesturebind ==============================
gesturebind=none,left,3,viewtoright
gesturebind=none,right,3,viewtoleft
gesturebind=none,up,3,toggleoverview
gesturebind=none,down,3,toggleoverview

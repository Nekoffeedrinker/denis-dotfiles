# Recargar la config con lider+r
unbind r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Definir tecla lider como CTRL+s
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# Seleccionar paneles como movimientos vim
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Intercambiar posición de ventanas
bind-key < swap-window -t -1
bind-key > swap-window -t +1

# Activar el uso del mouse
set -g mouse on

# Poner arriba la barra de estado
set-option -g status-position top

# ====== PLUGINS ======
# No olvides clonar el repo de Tmux Plugin Manager con:
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.3.0'

# cosas de catppuccin
set -g @catppuccin_window_status_style "rounded"
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"



# Inicializar TMUX plugin manager (Mantener esta linea al final de tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
